spring:
  application:
    name: industrial-monitoring-backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  info:
    env:
      enabled: true

info:
  app:
    name: industrial-monitoring-backend
    description: Industrial monitoring backend for MQTT based edge telemetry
    version: 0.0.1-SNAPSHOT

server:
  port: 8080

mqtt:
  broker-url: ${MQTT_BROKER_URL}
  client-id: ${MQTT_CLIENT_ID}
  topic-root: ${MQTT_TOPIC_ROOT}
  device-id: ${MQTT_DEVICE_ID}
  username: ${MQTT_USERNAME}
  password: ${MQTT_PASSWORD}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs