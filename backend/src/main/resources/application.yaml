spring:
  application:
    name: industrial-monitoring-backend

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/industrial-monitoring}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/industrial-monitoring/protocol/openid-connect/certs}
          audiences:
            - ${KEYCLOAK_AUDIENCE:industrial-monitoring-api}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  info:
    env:
      enabled: true

info:
  app:
    name: industrial-monitoring-backend
    description: Industrial monitoring backend for MQTT based edge telemetry
    version: 0.0.1-SNAPSHOT

server:
  port: 8080

mqtt:
  broker-url: ${MQTT_BROKER_URL}
  client-id: ${MQTT_CLIENT_ID}
  topic-root: ${MQTT_TOPIC_ROOT}
  device-id: ${MQTT_DEVICE_ID}
  username: ${MQTT_USERNAME}
  password: ${MQTT_PASSWORD}

export:
  enabled: ${EXPORT_ENABLED:true}
  output-dir: ${EXPORT_OUTPUT_DIR:exports}
  chunk-size: ${EXPORT_CHUNK_SIZE:100}
  cron: "${EXPORT_CRON:0 0 2 1 1 *}"
  zone: ${EXPORT_ZONE:Europe/Berlin}

  mail:
    enabled: ${EXPORT_MAIL_ENABLED:false}
    from: ${EXPORT_MAIL_FROM:no-reply@industrial-monitoring.local}
    annual-recipient: ${EXPORT_MAIL_ANNUAL_RECIPIENT:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs