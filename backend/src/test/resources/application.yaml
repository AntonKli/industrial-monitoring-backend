spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/industrial_monitoring
    username: industrial_user
    password: industrial_password

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/industrial-monitoring
          jwk-set-uri: http://localhost:8180/realms/industrial-monitoring/protocol/openid-connect/certs
          audiences:
            - industrial-monitoring-api

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

mqtt:
  broker-url: tcp://localhost:1883
  client-id: test-client
  topic-root: rtz
  device-id: edge01
  username: edge
  password: edge_password

  subscriber:
    enabled: false

export:
  enabled: false
  output-dir: target/test-exports
  chunk-size: 10
  cron: "0 0 2 1 1 *"
  zone: Europe/Berlin
