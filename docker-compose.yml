services:
  postgres:
    image: postgres:16
    container_name: industrial-monitoring-postgres
    environment:
      POSTGRES_DB: industrial_monitoring
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - industrial_monitoring_postgres_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.7.0
    container_name: industrial-monitoring-keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_VIEWER_PASSWORD: ${KEYCLOAK_VIEWER_PASSWORD}
      KEYCLOAK_OPERATOR_PASSWORD: ${KEYCLOAK_OPERATOR_PASSWORD}
      KEYCLOAK_AUDITOR_PASSWORD: ${KEYCLOAK_AUDITOR_PASSWORD}
      KEYCLOAK_APP_ADMIN_PASSWORD: ${KEYCLOAK_APP_ADMIN_PASSWORD}
    ports:
      - "8180:8080"
    volumes:
      - industrial_monitoring_keycloak_data:/opt/keycloak/data
      - ./docker/keycloak/industrial-monitoring-realm.json:/opt/keycloak/data/import/industrial-monitoring-realm.json:ro
    mem_limit: 1g

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: industrial-monitoring-mosquitto
    ports:
      - "1884:1883"
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: industrial-monitoring-backend
    depends_on:
      - postgres
      - mosquitto
      - keycloak
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/industrial_monitoring
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      MQTT_BROKER_URL: tcp://mosquitto:1883
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID}
      MQTT_TOPIC_ROOT: ${MQTT_TOPIC_ROOT}
      MQTT_DEVICE_ID: ${MQTT_DEVICE_ID}
      MQTT_USERNAME: ${MQTT_USERNAME}
      MQTT_PASSWORD: ${MQTT_PASSWORD}
      EXPORT_ENABLED: "${EXPORT_ENABLED:-true}"
      EXPORT_OUTPUT_DIR: "${EXPORT_OUTPUT_DIR:-/app/exports}"
      EXPORT_CHUNK_SIZE: "${EXPORT_CHUNK_SIZE:-100}"
      EXPORT_CRON: "${EXPORT_CRON:-0 0 2 1 1 *}"
      EXPORT_ZONE: "${EXPORT_ZONE:-Europe/Berlin}"
      KEYCLOAK_ISSUER_URI: http://localhost:8180/realms/industrial-monitoring
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/industrial-monitoring/protocol/openid-connect/certs
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE}
    ports:
      - "8080:8080"
    volumes:
      - ./exports:/app/exports

  prometheus:
    image: prom/prometheus:v3.0.1
    container_name: industrial-monitoring-prometheus
    depends_on:
      - backend
    ports:
      - "19090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.1.0
    container_name: industrial-monitoring-grafana
    depends_on:
      - prometheus
    ports:
      - "13000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

volumes:
  industrial_monitoring_postgres_data:
  industrial_monitoring_keycloak_data:
